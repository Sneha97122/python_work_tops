<!DOCTYPE html>
<html>
<head>
    <title>Doctors</title>

    <style>
        body {
            font-family: Arial;
        }

        h2 {
            text-align: center;
        }

        p {
            padding: 8px;
            border-bottom: 1px solid #ccc;
        }
    </style>

</head>
<body>

<h1>Doctor List</h1>

{% endfor %}

</body>
</html>
