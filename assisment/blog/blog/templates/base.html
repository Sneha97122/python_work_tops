    <style>
        body{
    background:#0f0f0f;
    font-family: 'Segoe UI', sans-serif;
}

/* NAVBAR */
.custom-navbar{
    background:#000000;
    padding:18px 0;
    box-shadow:0 4px 15px rgba(255,215,0,0.2);
}

.blog-title{
    font-size:36px;
    font-weight:900;
    font-style:italic;
    letter-spacing:3px;
    color:#ffd700;
    text-shadow:0 0 10px rgba(255,215,0,0.6);
}

/* CARDS */
.card{
    background:#1a1a1a;
    color:#f5f5f5;
    border:1px solid #ffd70033;
    border-radius:12px;
    transition:0.3s;
}

.card:hover{
    transform: translateY(-5px);
    box-shadow:0 10px 25px rgba(255,215,0,0.2);
}

.card p{
    color:#ccc;
}

/* BUTTONS */
.btn-primary{
    background:#ffd700;
    color:black;
    border:none;
}

.btn-success{
    background:#d4af37;
    color:black;
    border:none;
}

.btn-danger{
    background:#b91c1c;
    border:none;
}

.btn-dark{
    background:#000;
    border:1px solid #ffd700;
    color:#ffd700;
}

/* FORM BOX */
.form-box{
    background:#111;
    padding:30px;
    border-radius:12px;
    box-shadow:0 8px 20px rgba(255,215,0,0.2);
}

.form-box input,
.form-box textarea{
    background:#222;
    border:1px solid #ffd70055;
    color:#fff;
    padding:8px;
    border-radius:5px;
    width:100%;
}

.form-box label{
    color:#ffd700;
}

/* CREATE CARD */
.create-card{
    background:#1a1a1a;
    color:white;
    border:1px solid #ffd70033;
}

.create-card input,
.create-card textarea{
    background:#222;
    border:1px solid #ffd70055;
    color:white;
}

/* DETAIL PAGE */
.detail-bg{
    background:#111;
    padding:40px;
    border-radius:12px;
    color:white;
    border:1px solid #ffd70033;
}

/* INPUT FIELDS */
input, textarea{
    background:#222 !important;
    color:white !important;
    border:1px solid #ffd70055 !important;
}

/* LINKS */
a{
    text-decoration:none;
    color:#ffd700;
}

a:hover{
    color:#ffea85;
}

    </style>

</head>

<body>


<nav class="navbar navbar-dark custom-navbar">
<div class="container">

<a class="navbar-brand blog-title" href="/">My Blog</a>

<div>

{% if user.is_authenticated %}

<span class="text-dark me-3 fw-bold ">
Hello {{ user.username }}
</span>

<a href="{% url 'logout' %}" class="btn btn-danger">Logout</a>

{% else %}

<a href="{% url 'login' %}" class="btn btn-success me-2">Login</a>

<a href="{% url 'register' %}" class="btn btn-primary">Register</a>

{% endif %}

</div>

</div>
</nav>

<div class="container mt-4 p-4 bg-#20c997 rounded shadow-sm">

{% block content %}

{% endblock %}

</div>

</body>

</html>
